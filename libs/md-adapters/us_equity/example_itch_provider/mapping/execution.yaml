provider: us_equity_l3_provider
source_message: order_executed
target_event: Execution
fields:
  stock:
    target: header.instrument_id
    transform: symbol_map.lookup
  sequence_number:
    target: header.seq
  timestamp:
    target: header.source_ts_ns
    transform: exchange_time_to_ns
  match_number:
    target: trade_id
  order_reference_number:
    target: resting_order_id
  shares:
    target: quantity
    transform: qty_to_fixed
  price:
    target: price
    transform: price_to_fixed
