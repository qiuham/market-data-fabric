provider: us_equity_l3_provider
source_message: order_add_replace_cancel
target_event: OrderEvent
fields:
  stock:
    target: header.instrument_id
    transform: symbol_map.lookup
  sequence_number:
    target: header.seq
  tracking_number:
    target: header.exchange_seq
  timestamp:
    target: header.source_ts_ns
    transform: exchange_time_to_ns
  order_reference_number:
    target: order_id
  original_order_reference_number:
    target: original_order_id
  buy_sell_indicator:
    target: side
    transform: map_side
  action:
    target: action
    transform: map_order_action
  shares:
    target: quantity
    transform: qty_to_fixed
  price:
    target: price
    transform: price_to_fixed
