provider: crypto_l3_provider
source_message: execution
target_event: Execution
fields:
  symbol:
    target: header.instrument_id
    transform: symbol_map.lookup
  sequence:
    target: header.seq
  trade_id:
    target: trade_id
  event_time:
    target: header.source_ts_ns
    transform: exchange_time_to_ns
  resting_order_id:
    target: resting_order_id
  aggressor_order_id:
    target: aggressor_order_id
  aggressor_side:
    target: aggressor_side
    transform: map_aggressor_side
  price:
    target: price
    transform: price_to_fixed
  quantity:
    target: quantity
    transform: qty_to_fixed
