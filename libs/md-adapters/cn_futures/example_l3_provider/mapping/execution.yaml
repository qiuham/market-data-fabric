provider: cn_futures_l3_provider
source_message: execution
target_event: Execution
fields:
  InstrumentID:
    target: header.instrument_id
    transform: symbol_map.lookup
  SequenceNo:
    target: header.seq
  TradeID:
    target: trade_id
  BuyOrderSysID:
    target: buy_order_id
  SellOrderSysID:
    target: sell_order_id
  ExchangeTime:
    target: header.source_ts_ns
    transform: exchange_time_to_ns
  Price:
    target: price
    transform: price_to_fixed
  Volume:
    target: quantity
    transform: qty_to_fixed
